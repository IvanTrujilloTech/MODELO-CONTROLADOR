version: '3.8'

services:
  web:
    build: .
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=finanzas_db
      - DB_USER=root
      - DB_PASS=rootpassword

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: finanzas_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

  websocket:
    build: .
    ports:
      - "8082:8080"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    command: ["php", "bin/chat-server.php"]
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=finanzas_db
      - DB_USER=root
      - DB_PASS=rootpassword

volumes:
 db_data: